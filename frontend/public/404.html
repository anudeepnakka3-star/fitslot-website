<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FitSlot – Page not found">
  <meta name="robots" content="noindex, nofollow">
  <title>404 – Page Not Found | FitSlot</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="text-on-surface antialiased bg-surface min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_20%_50%,rgba(0,74,198,0.04)_0%,transparent_60%),radial-gradient(ellipse_at_80%_20%,rgba(37,99,235,0.04)_0%,transparent_60%)]">

  <div class="w-full max-w-lg text-center relative">
    <!-- Decorative Glow -->
    <div class="absolute -right-20 -top-20 w-44 h-44 bg-primary-container/10 rounded-full blur-3xl"></div>
    <div class="absolute -left-20 -bottom-20 w-44 h-44 bg-error/5 rounded-full blur-3xl"></div>

    <!-- Icon -->
    <div class="relative z-10">
      <div class="w-24 h-24 rounded-2xl bg-surface-container-lowest shadow-[0px_24px_48px_rgba(26,28,29,0.06)] flex items-center justify-center mx-auto mb-8 border border-outline-variant/10">
        <span class="material-symbols-outlined text-6xl text-error/60">explore_off</span>
      </div>

      <!-- 404 Text -->
      <h1 class="text-8xl font-black tracking-tighter text-on-surface/10 mb-2 select-none">404</h1>
      <h2 class="text-2xl font-extrabold tracking-tight text-on-surface mb-3">Page Not Found</h2>
      <p class="text-on-surface-variant max-w-sm mx-auto mb-10">
        The page you're looking for doesn't exist or has been moved. 
        Let's get you back to your workout schedule.
      </p>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <a href="/" class="inline-flex items-center gap-2 px-8 py-3 rounded-full kinetic-gradient text-white text-sm font-bold shadow-lg transition-transform active:scale-95 hover:shadow-xl">
          <span class="material-symbols-outlined text-[18px]">home</span>
          Go Home
        </a>
        <button onclick="history.back()" class="inline-flex items-center gap-2 px-8 py-3 rounded-full border-2 border-outline-variant/30 text-on-surface-variant text-sm font-bold hover:bg-surface-container-high transition-all active:scale-95">
          <span class="material-symbols-outlined text-[18px]">arrow_back</span>
          Go Back
        </button>
      </div>

      <!-- Quick Links -->
      <div class="mt-12 flex items-center justify-center gap-6 text-sm">
        <a href="/login.html" class="text-primary font-bold hover:underline flex items-center gap-1">
          <span class="material-symbols-outlined text-[16px]">login</span> Login
        </a>
        <a href="/slots.html" class="text-primary font-bold hover:underline flex items-center gap-1">
          <span class="material-symbols-outlined text-[16px]">fitness_center</span> Slots
        </a>
        <a href="/dashboard.html" class="text-primary font-bold hover:underline flex items-center gap-1">
          <span class="material-symbols-outlined text-[16px]">dashboard</span> Dashboard
        </a>
      </div>
    </div>
  </div>

</body>
</html>
