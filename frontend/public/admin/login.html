<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FitSlot – Admin login to manage gym operations, slots, and student attendance.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Admin Login – FitSlot">
  <meta property="og:description" content="Restricted admin portal for managing FitSlot gym operations.">
  <meta property="og:type" content="website">
  <title>Admin Login – FitSlot</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="text-on-surface antialiased bg-surface min-h-screen flex text-center items-center justify-center p-6 bg-[radial-gradient(ellipse_at_20%_50%,rgba(0,74,198,0.04)_0%,transparent_60%),radial-gradient(ellipse_at_80%_20%,rgba(37,99,235,0.04)_0%,transparent_60%)]">
  <div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_24px_48px_rgba(26,28,29,0.06)] p-8 md:p-12 relative overflow-hidden text-center mx-auto">
    
    <!-- Decorative Glow -->
    <div class="absolute -right-12 -top-12 w-32 h-32 bg-secondary/10 rounded-full blur-2xl"></div>

    <!-- Logo -->
    <div class="flex flex-col items-center gap-2 mb-8 relative z-10">
      <div class="w-14 h-14 rounded-xl kinetic-gradient text-white flex items-center justify-center text-3xl shadow-lg">
        <span class="material-symbols-outlined">fitness_center</span>
      </div>
      <div class="text-2xl font-black tracking-tight text-on-surface">Fit<span class="text-primary">Slot</span></div>
    </div>

    <!-- Admin Badge -->
    <div class="flex justify-center mb-8 relative z-10">
      <span class="px-3 py-1 bg-warning/10 text-warning text-xs font-bold uppercase tracking-wider rounded-full">Admin Portal</span>
    </div>

    <!-- Header Text -->
    <div class="mb-8 text-left relative z-10">
        <h2 class="text-2xl font-extrabold tracking-tight text-on-surface">Admin Login</h2>
        <p class="text-on-surface-variant text-sm mt-1">Restricted to authorized personnel only.</p>
    </div>

    <!-- Alerts -->
    <div id="alert-error" class="hidden mb-6 p-4 rounded-md bg-error-container text-error text-sm font-medium text-left relative z-10"></div>

    <!-- ─── Login Form ─── -->
    <form id="admin-login-form" autocomplete="on" class="relative z-10 w-full text-left">
      
      <div class="flex flex-col gap-5 text-left mb-8">
        <div class="w-full">
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" for="email">Admin Email</label>
          <input class="w-full bg-surface-container-low border-transparent focus:bg-surface-container-lowest focus:border-outline-variant/40 focus:ring-0 rounded-md py-3 px-4 text-sm transition-all" type="email" id="email" placeholder="admin@bvrit.ac.in" autocomplete="email" required>
        </div>
        <div class="w-full">
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" for="password">Password</label>
          <input class="w-full bg-surface-container-low border-transparent focus:bg-surface-container-lowest focus:border-outline-variant/40 focus:ring-0 rounded-md py-3 px-4 text-sm transition-all" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>

      <button class="w-full flex items-center justify-center h-12 rounded-full kinetic-gradient text-white text-sm font-bold shadow-lg transition-transform active:scale-95" type="submit" id="login-btn">
        <span id="btn-text">Sign In as Admin</span>
        <div class="spinner !hidden" id="spinner"></div>
      </button>

      <p class="mt-6 text-sm text-center text-on-surface-variant">
        Student? <a href="/login.html" class="text-primary font-bold hover:underline">Student Login →</a>
      </p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn() && Auth.getRole() === 'admin') {
      window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert-error');
      alertEl.classList.add('hidden');
      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('spinner').classList.remove('!hidden');
      document.getElementById('login-btn').disabled = true;

      try {
        const data = await api.login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        if (data.user.role !== 'admin') {
          throw new Error('Access denied. This portal is for admins only.');
        }
        Auth.setSession(data.token, data.user);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        alertEl.textContent = '⚠ ' + err.message;
        alertEl.classList.remove('hidden');
        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('spinner').classList.add('!hidden');
        document.getElementById('login-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
