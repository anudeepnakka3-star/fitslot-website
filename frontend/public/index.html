<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FitSlot – Campus Gym Slot Booking System. Book your gym sessions, manage attendance, and stay fit with your college community.">
    <meta name="keywords" content="gym booking, campus gym, slot booking, fitness, FitSlot, BVRIT">
    <meta property="og:title" content="FitSlot – Campus Gym Slot Booking">

</head>

<body>
    <script src="/js/auth.js"></script>
    <script>
        // Root redirect based on role
        if (Auth.isLoggedIn()) {
            if (Auth.getRole() === 'admin') {
                window.location.href = '/admin/dashboard.html';
            } else {
                window.location.href = '/dashboard.html';
            }
        } else {
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>
