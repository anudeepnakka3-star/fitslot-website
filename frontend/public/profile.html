<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FitSlot – Update your profile, choose an avatar, and manage your personal details.">
  <meta property="og:title" content="Profile Settings – FitSlot">
  <meta property="og:description" content="Manage your FitSlot profile, update personal information, and customize your avatar.">
  <meta property="og:type" content="website">
  <title>Profile Settings – FitSlot</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/index.css">

  <style>
    /* Prevent raw tailwind flickering if needed */
    [x-cloak] { display: none !important; }
    
    .avatar-btn.selected {
      border-color: var(--color-primary);
      background-color: var(--color-primary-container);
      transform: scale(1.05);
    }
  </style>
</head>

<body class="text-on-surface antialiased bg-surface">

  <!-- TopNavBar -->
  <nav class="fixed top-0 w-full z-50 glass-nav shadow-sm dark:shadow-none">
    <div class="flex items-center justify-between px-6 py-3 w-full max-w-screen-2xl mx-auto">
      <div class="flex items-center gap-8">
        <a href="/dashboard.html" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg kinetic-gradient text-white flex items-center justify-center text-lg shadow-sm">
            <span class="material-symbols-outlined text-[18px]">fitness_center</span>
          </div>
          <span class="text-xl font-black tracking-tighter text-primary">FitSlot</span>
        </a>
        <div class="hidden md:flex items-center gap-6">
          <a class="text-on-surface-variant hover:text-on-surface transition-colors duration-200" href="/dashboard.html">Dashboard</a>
          <a class="text-on-surface-variant hover:text-on-surface transition-colors duration-200" href="/my-bookings.html">My Bookings</a>
          <a class="text-on-surface-variant hover:text-on-surface transition-colors duration-200" href="/slots.html">Classes</a>
        </div>
      </div>
      <div class="flex items-center gap-4 relative">
        <div class="hidden md:flex flex-col items-end mr-2">
           <span class="text-sm font-bold text-on-surface" id="sidebar-name">Loading...</span>
           <span class="text-xs text-on-surface-variant uppercase tracking-wider" id="sidebar-role">Student</span>
        </div>
        <!-- Profile dropdown trigger -->
        <a href="/dashboard.html" class="h-10 w-10 flex items-center justify-center rounded-full bg-surface-container-high kinetic-gradient text-white font-bold cursor-pointer transition-transform hover:scale-105" id="nav-avatar" title="Dashboard">
          ?
        </a>
        <button class="h-10 w-10 flex items-center justify-center rounded-full bg-error/10 text-error hover:bg-error/20 transition-colors cursor-pointer" data-action="logout" title="Sign Out">
          <span class="material-symbols-outlined text-[18px]">logout</span>
        </button>
      </div>
    </div>
    <div class="bg-outline-variant/20 h-[1px]"></div>
  </nav>

  <main class="pt-24 pb-20 md:pb-12 px-6 md:px-12 max-w-screen-md mx-auto min-h-screen">
    
    <!-- Header Section -->
    <header class="mb-10 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface mb-3">Profile Settings</h1>
      <p class="text-lg text-on-surface-variant">Update your personal information and choose an avatar.</p>
    </header>

    <div class="bg-surface-container-lowest rounded-2xl shadow-[0px_24px_48px_rgba(26,28,29,0.04)] overflow-hidden border border-outline-variant/20">
      <form id="profile-form" class="p-8 md:p-10 space-y-8">
        
        <!-- Error/Success Banner -->
        <div id="profile-message" class="hidden p-4 rounded-xl text-sm font-bold mb-6"></div>

        <!-- Avatar Selection -->
        <div>
          <h3 class="text-lg font-bold text-on-surface mb-4">Choose an Avatar</h3>
          <div class="grid grid-cols-5 md:grid-cols-10 gap-3" id="avatar-grid">
            <!-- Rendered by JS -->
          </div>
          <input type="hidden" id="photo_url" name="photo_url" value="">
        </div>

        <hr class="border-outline-variant/20">

        <!-- Editable Fields -->
        <div>
          <h3 class="text-lg font-bold text-on-surface mb-4">Personal Details</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Full Name</label>
              <input type="text" id="name" required
                class="w-full bg-surface-container-low border border-outline-variant/50 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
            
            <div>
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Department</label>
              <input type="text" id="department" required placeholder="e.g. Computer Science"
                class="w-full bg-surface-container-low border border-outline-variant/50 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>

            <div>
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Class Section</label>
              <input type="text" id="class_section" required placeholder="e.g. CSE-A"
                class="w-full bg-surface-container-low border border-outline-variant/50 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
          </div>
        </div>

        <hr class="border-outline-variant/20">

        <!-- Readonly Fields -->
        <div>
          <h3 class="text-lg font-bold text-on-surface mb-4">Account Information</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-70">
            <div>
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Email (Read Only)</label>
              <input type="email" id="email" readonly disabled
                class="w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3 text-on-surface cursor-not-allowed">
            </div>
            <div>
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Roll Number (Read Only)</label>
              <input type="text" id="roll_number" readonly disabled
                class="w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3 text-on-surface cursor-not-allowed">
            </div>
          </div>
        </div>

        <div class="flex justify-end pt-4">
          <button type="submit" id="save-btn" class="px-8 py-3 bg-primary text-on-primary rounded-full font-bold shadow-md hover:opacity-90 transition-all active:scale-95 flex items-center gap-2">
            <span class="material-symbols-outlined text-[20px]">save</span>
            Save Changes
          </button>
        </div>

      </form>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>  <!-- Functionality -->
  <script>
    // 1. Strict frontend session protection
    Auth.requireStudent();

    const AVATARS = [
      '😀', '😎', '🤓', '🤖', '👾', '🦊', '🐱', '🐼', '🦖', '🦄'
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.isLoggedIn()) return window.location.href = '/login.html';
      
      const user = Auth.getUser();
      if (!user) return window.location.href = '/login.html';
      
      // Update top nav
      document.getElementById('sidebar-name').textContent = user.name;
      const avatarBtn = document.getElementById('nav-avatar');
      avatarBtn.textContent = user.photo_url || user.name.charAt(0).toUpperCase();

      // Populate form
      document.getElementById('name').value = user.name || '';
      document.getElementById('department').value = user.department || '';
      document.getElementById('class_section').value = user.class_section || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('roll_number').value = user.roll_number || 'N/A';
      document.getElementById('photo_url').value = user.photo_url || '';

      // Render avatars
      const grid = document.getElementById('avatar-grid');
      AVATARS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `avatar-btn flex items-center justify-center text-3xl md:text-4xl aspect-square rounded-2xl border-2 border-outline-variant/30 hover:bg-surface-container-high transition-all cursor-pointer`;
        btn.textContent = emoji;
        if (user.photo_url === emoji) btn.classList.add('selected');

        btn.onclick = () => {
          document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          document.getElementById('photo_url').value = emoji;
        };
        grid.appendChild(btn);
      });

      // Handle Submit
      const form = document.getElementById('profile-form');
      const msgBox = document.getElementById('profile-message');
      const saveBtn = document.getElementById('save-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<div class="spinner border-on-primary border-t-transparent w-5 h-5 mx-auto"></div>';
        
        const payload = {
          name: document.getElementById('name').value,
          department: document.getElementById('department').value,
          class_section: document.getElementById('class_section').value,
          photo_url: document.getElementById('photo_url').value
        };

        try {
          const res = await api.updateProfile(payload);
          msgBox.textContent = res.message || 'Profile updated successfully!';
          msgBox.className = 'p-4 rounded-xl text-sm font-bold bg-[#E8F5E9] text-[#1B5E20] block mb-6';
          
          // Update nav avatar immediately
          if(payload.photo_url) avatarBtn.textContent = payload.photo_url;
          document.getElementById('sidebar-name').textContent = payload.name;
          
          // Update session cache so it persists on reload!
          const user = Auth.getUser();
          Object.assign(user, payload);
          Auth.setSession(Auth.getToken(), user);
        } catch (err) {
          msgBox.textContent = err.message || 'Failed to update profile';
          msgBox.className = 'p-4 rounded-xl text-sm font-bold bg-[#FFEBEE] text-[#B71C1C] block mb-6';
        } finally {
          saveBtn.disabled = false;
          saveBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">save</span> Save Changes';
        }
      });
    });
  </script>
</body>
</html>
