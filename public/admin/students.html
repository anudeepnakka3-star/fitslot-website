<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FitSlot – Student Management">
    <title>Students – FitSlot</title>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🏋️</div>
                <div class="logo-text">Fit<span>Slot</span></div>
            </div>
            <nav class="sidebar-nav">
                <span class="nav-section-label">Admin</span>
                <a href="/admin/dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
                <a href="/admin/slots.html" class="nav-item"><span class="nav-icon">📅</span> Slot Monitor</a>
                <a href="/admin/attendance.html" class="nav-item"><span class="nav-icon">✅</span> Attendance</a>
                <a href="/admin/students.html" class="nav-item active"><span class="nav-icon">👥</span> Students</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar" id="sidebar-avatar">A</div>
                    <div class="user-info">
                        <div class="user-name" id="sidebar-name">Admin</div>
                        <div class="user-role" id="sidebar-role">admin</div>
                    </div>
                </div>
                <button class="btn btn-ghost btn-full btn-sm" data-action="logout">⏻ Sign Out</button>
            </div>
        </aside>

        <div class="main-area">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:1rem">
                    <button class="hamburger" id="hamburger">☰</button>
                    <h4 style="color:var(--text-primary);font-size:0.95rem">Students</h4>
                </div>
                <input type="text" class="form-input" id="search-input" placeholder="Search students…"
                    style="width:220px;font-size:0.85rem;padding:0.4rem 0.75rem" oninput="filterStudents()">
            </header>

            <main class="page-content">
                <div class="page-header">
                    <div class="page-header-top">
                        <div>
                            <h1 class="page-title">Student Management</h1>
                            <p class="page-subtitle">View all registered students, their no-show counts, and manage
                                blocks</p>
                        </div>
                    </div>
                </div>

                <div class="alert alert-error" id="alert-error"></div>
                <div class="alert alert-success" id="alert-success"></div>

                <div class="card" style="padding:0">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Roll No.</th>
                                    <th>No-Shows</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="students-tbody">
                                <tr>
                                    <td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted)">
                                        <div class="spinner" style="margin:0 auto 1rem"></div>Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        if (!Auth.requireAdmin()) throw new Error('Not authorized');

        let allStudents = [];

        function showAlert(type, msg) {
            ['error', 'success'].forEach(t => document.getElementById(`alert-${t}`).classList.remove('show'));
            const el = document.getElementById(`alert-${type}`);
            el.textContent = (type === 'error' ? '⚠ ' : '✓ ') + msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function filterStudents() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = q ? allStudents.filter(s =>
                s.name.toLowerCase().includes(q) ||
                s.email.toLowerCase().includes(q) ||
                (s.roll_number || '').toLowerCase().includes(q)
            ) : allStudents;
            renderTable(filtered);
        }

        function renderTable(students) {
            const tbody = document.getElementById('students-tbody');
            if (!students.length) {
                tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state"><div class="empty-title">No students found</div></div>
      </td></tr>`;
                return;
            }
            tbody.innerHTML = students.map(s => {
                const isBlocked = s.blocked_until && new Date(s.blocked_until) > new Date();
                return `
        <tr>
          <td class="td-primary">
            <div style="display:flex;align-items:center;gap:0.5rem">
              <div class="avatar" style="width:30px;height:30px;font-size:0.75rem">${s.name.charAt(0).toUpperCase()}</div>
              ${s.name}
            </div>
          </td>
          <td style="font-size:0.82rem">${s.email}</td>
          <td>${s.roll_number || '–'}</td>
          <td>
            <span style="font-weight:700;color:${s.no_show_count >= 3 ? 'var(--danger)' : s.no_show_count > 0 ? 'var(--warning)' : 'var(--accent)'}">${s.no_show_count}</span>
            <div style="margin-top:3px;width:60px">
              <div class="progress-wrap" style="height:4px">
                <div class="progress-bar ${s.no_show_count >= 3 ? 'danger' : s.no_show_count >= 2 ? 'warning' : ''}" style="width:${Math.min(s.no_show_count / 3 * 100, 100)}%"></div>
              </div>
            </div>
          </td>
          <td>
            ${isBlocked
                        ? `<span class="badge badge-danger">Blocked until ${new Date(s.blocked_until).toLocaleDateString('en-IN')}</span>`
                        : '<span class="badge badge-success">Active</span>'}
          </td>
          <td style="font-size:0.78rem;color:var(--text-muted)">
            ${new Date(s.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })}
          </td>
          <td>
            ${isBlocked
                        ? `<button class="btn btn-outline btn-sm" onclick="unblockStudent(${s.id}, '${s.name}')">Unblock</button>`
                        : s.no_show_count > 0
                            ? `<button class="btn btn-outline btn-sm" onclick="resetNoShows(${s.id}, '${s.name}')">Reset No-Shows</button>`
                            : '–'}
          </td>
        </tr>
      `;
            }).join('');
        }

        async function unblockStudent(id, name) {
            if (!confirm(`Unblock ${name}?`)) return;
            try {
                const data = await api.unblockUser(id);
                showAlert('success', data.message);
                await loadStudents();
            } catch (e) { showAlert('error', e.message); }
        }

        async function resetNoShows(id, name) {
            if (!confirm(`Reset no-show count for ${name}?`)) return;
            try {
                // Unblock also resets count
                const data = await api.unblockUser(id);
                showAlert('success', `No-show count reset for ${name}`);
                await loadStudents();
            } catch (e) { showAlert('error', e.message); }
        }

        async function loadStudents() {
            try {
                const data = await api.getUsers();
                allStudents = data.users;
                filterStudents();
            } catch (e) {
                document.getElementById('students-tbody').innerHTML =
                    `<tr><td colspan="7" style="text-align:center;color:var(--danger)">${e.message}</td></tr>`;
            }
        }

        loadStudents();
    </script>
</body>

</html>
