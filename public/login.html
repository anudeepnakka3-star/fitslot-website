<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FitSlot – Student login to book campus gym slots">
  <title>Login – FitSlot</title>
  <link rel="stylesheet" href="/index.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* Google button wrapper */
    .google-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    /* Google's injected button needs to be sized */
    .google-btn-wrap>div {
      width: 100% !important;
    }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.1rem 0;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    /* Fallback manual Google button (shown if GIS library fails to render) */
    .google-fallback-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-md);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      background: #fff;
      color: #3c4043;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.2s;
      font-family: inherit;
    }

    .google-fallback-btn:hover {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-box fade-in">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">🏋️</div>
        <div class="logo-text">Fit<span>Slot</span></div>
      </div>

      <!-- Tabs -->
      <div class="tabs" style="margin-bottom:1.5rem;">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Alerts -->
      <div class="alert alert-error" id="alert-error" role="alert"></div>
      <div class="alert alert-success" id="alert-success" role="alert"></div>

      <!-- ─── Login Form ─── -->
      <form id="login-form" autocomplete="on">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle" style="margin-bottom:1.25rem">Sign in to book your gym slot</p>

        <!-- Google Sign-In button (GIS renders here) -->
        <div class="google-btn-wrap" id="g-signin-login"></div>

        <!-- Fallback manual button (hidden until GIS btn confirmed rendered) -->
        <button type="button" class="google-fallback-btn" id="google-fallback-login" style="display:none"
          onclick="startGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="#4285F4" />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
              fill="#34A853" />
            <path
              d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              fill="#FBBC05" />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              fill="#EA4335" />
          </svg>
          Sign in with Google
        </button>

        <div class="or-divider">or sign in with email</div>

        <div class="form-group">
          <label class="form-label" for="login-email">College Email</label>
          <input class="form-input" type="email" id="login-email" placeholder="yourname@bvrit.ac.in"
            autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••"
            autocomplete="current-password" required>
        </div>

        <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-btn" style="margin-top:0.25rem">
          <span id="login-btn-text">Sign In</span>
          <div class="spinner" id="login-spinner" style="display:none;width:18px;height:18px;"></div>
        </button>

        <p style="text-align:center;margin-top:1rem;font-size:0.82rem;color:var(--text-muted)">
          Admin? <a href="/admin/login.html">Admin Login →</a>
        </p>
      </form>

      <!-- ─── Register Form ─── -->
      <form id="register-form" style="display:none" autocomplete="on">
        <h2 class="auth-title">Create account</h2>
        <p class="auth-subtitle" style="margin-bottom:1rem">Use your @bvrit.ac.in email</p>

        <div class="google-btn-wrap" id="g-signin-register"></div>
        <button type="button" class="google-fallback-btn" id="google-fallback-register" style="display:none"
          onclick="startGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="#4285F4" />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
              fill="#34A853" />
            <path
              d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              fill="#FBBC05" />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              fill="#EA4335" />
          </svg>
          Continue with Google
        </button>
        <div class="or-divider">or register with email</div>

        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="e.g. Anudeep Reddy" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">College Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="yourname@bvrit.ac.in" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-roll">Roll Number</label>
          <input class="form-input" type="text" id="reg-roll" placeholder="e.g. 22B21A0001">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min. 6 characters" required>
        </div>

        <button class="btn btn-primary btn-full btn-lg" type="submit" id="reg-btn" style="margin-top:0.25rem">
          <span id="reg-btn-text">Create Account</span>
          <div class="spinner" id="reg-spinner" style="display:none;width:18px;height:18px;"></div>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const GOOGLE_CLIENT_ID = '254105171372-aib0pt80had9mvnll3bbj5n3grn2phgo.apps.googleusercontent.com';

    // Redirect if already logged in
    if (Auth.isLoggedIn() && Auth.getRole() === 'student') {
      window.location.href = '/dashboard.html';
    }

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
      hideAlerts();
    }

    function showAlert(type, msg) {
      hideAlerts();
      const el = document.getElementById(`alert-${type}`);
      el.textContent = (type === 'error' ? '⚠ ' : '✓ ') + msg;
      el.classList.add('show');
    }

    function hideAlerts() {
      document.querySelectorAll('.alert').forEach(e => e.classList.remove('show'));
    }

    function setLoading(formId, loading) {
      const prefix = formId === 'login-form' ? 'login' : 'reg';
      document.getElementById(`${prefix}-btn-text`).style.display = loading ? 'none' : '';
      document.getElementById(`${prefix}-spinner`).style.display = loading ? '' : 'none';
      document.getElementById(`${prefix}-btn`).disabled = loading;
    }

    /* ─── Google Identity Services callback ─────────────────────── */
    async function handleGoogleCredential(response) {
      hideAlerts();
      try {
        // Send the ID token credential to our backend
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Google sign-in failed');
        if (data.user.role !== 'student') {
          showAlert('error', 'Admin accounts must use the Admin Login page.');
          return;
        }
        Auth.setSession(data.token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert('error', err.message);
      }
    }

    /* ─── Init Google Sign-In buttons after GIS loads ─────────── */
    window.addEventListener('load', () => {
      if (!window.google?.accounts?.id) {
        // GIS library didn't load — show fallback buttons
        document.getElementById('google-fallback-login').style.display = '';
        document.getElementById('google-fallback-register').style.display = '';
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
        auto_select: false,
      });

      // Render Sign In With Google button in both tab panels
      const btnConfig = { theme: 'outline', size: 'large', width: 340, text: 'signin_with', shape: 'rectangular' };
      google.accounts.id.renderButton(document.getElementById('g-signin-login'), { ...btnConfig });
      google.accounts.id.renderButton(document.getElementById('g-signin-register'), { ...btnConfig, text: 'continue_with' });
    });

    // Fallback: redirect to Google OAuth manually if GIS failed to load
    function startGoogleSignIn() {
      showAlert('error', 'Google Sign-In could not load. Check your internet connection and try again.');
    }

    /* ─── Email/Password Login ──────────────────────────────────── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlerts();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      setLoading('login-form', true);
      try {
        const data = await api.login(email, password);
        if (data.user.role !== 'student') {
          showAlert('error', 'This login is for students only. Use Admin Login.');
          setLoading('login-form', false);
          return;
        }
        Auth.setSession(data.token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert('error', err.message);
        setLoading('login-form', false);
      }
    });

    /* ─── Email/Password Register ───────────────────────────────── */
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlerts();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const roll_number = document.getElementById('reg-roll').value.trim();
      const password = document.getElementById('reg-password').value;
      setLoading('register-form', true);
      try {
        const data = await api.register({ name, email, password, roll_number });
        Auth.setSession(data.token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert('error', err.message);
        setLoading('register-form', false);
      }
    });
  </script>
</body>

</html>
